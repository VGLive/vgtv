<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG TV - Live Streams</title>
    <link rel="icon" href="https://raw.githubusercontent.com/VGLiveTV/vgtv/refs/heads/main/fav.png">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #e50914; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* Navbar */
        .nav { padding: 15px; background: #111; border-bottom: 2px solid var(--accent); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .nav-logo { height: 35px; margin-right: 10px; object-fit: contain; }
        
        /* Search Input */
        input[type="text"] { padding: 10px 15px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; outline: none; font-size: 14px; flex: 1; min-width: 200px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(229, 9, 20, 0.4); }
        
        /* Grid Layout */
        .grid { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; align-content: start; }
        .card { background: var(--card); padding: 15px 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #333; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.4); }
        .card img { width: 70px; height: 70px; object-fit: contain; background: #fff; border-radius: 8px; padding: 5px; margin-bottom: 12px; }
        .card div { font-size: 13px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: bold; width: 100%; }
        .card-sub { color: #888; font-size: 11px !important; margin-top: 5px; font-weight: bold !important; text-transform: uppercase; }
        
        /* Loading Text */
        .loading { grid-column: 1/-1; text-align: center; color: #888; margin-top: 50px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="nav">
        <img src="https://raw.githubusercontent.com/VGLiveTV/vgtv/refs/heads/main/logo.png" alt="VG TV Logo" class="nav-logo">
        <input type="text" id="search" placeholder="Search Channels...">
    </div>

    <div id="grid" class="grid">
        <div class="loading">Fetching Channels...</div>
    </div>

    <script>
        const API_URL = "https://raw.githubusercontent.com/vaathala00/jow/main/output.json";
        let activeDb = []; 

        // 1. Fetch API data
        async function fetchServerData() {
            const grid = document.getElementById('grid');
            
            try {
                const res = await fetch(API_URL);
                if (res.ok) {
                    const rawData = await res.json();
                    
                    // Auto-parse the raw JSON into the uniform format
                    activeDb = rawData.map(c => ({
                        name: c.name || "Unknown Channel",
                        logo: c.logo || "",
                        link: c.link || c.url || c.stream_url || "",
                        keyId: c.keyId || c.key_id || "",
                        key: c.key || "",
                        cookie: c.cookie || "",
                        category: c.group || c.category || "Live TV"
                    }));

                    // Sort alphabetically
                    activeDb.sort((a, b) => a.name.localeCompare(b.name));
                    applyFilters();
                } else {
                    throw new Error("Server Error");
                }
            } catch (err) {
                grid.innerHTML = `<div class="loading" style="color:#ef4444;">Failed to Load Channels.<br>Please check your connection.</div>`;
                console.error(err);
            }
        }

        // 2. Search & Filter Logic
        const searchInput = document.getElementById('search');

        function applyFilters() {
            const t = searchInput.value.toLowerCase();
            const filtered = activeDb.filter(c => c.name.toLowerCase().includes(t));
            render(filtered);
        }

        searchInput.oninput = applyFilters;

        // 3. Render Channel Grid dynamically
        function render(data) {
            const g = document.getElementById('grid');
            if(data.length === 0) {
                g.innerHTML = '<div class="loading">No Channels Found.</div>';
                return;
            }
            g.innerHTML = data.map(c => {
                // Safely encode JSON to prevent HTML breakage on click
                const safeData = encodeURIComponent(JSON.stringify(c));
                return `
                <div class="card" onclick="playInNewTab('${safeData}')">
                    <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/70?text=TV'">
                    <div>${c.name}</div>
                    <div class="card-sub">${c.category}</div>
                </div>
            `}).join('');
        }

        // 4. Generate & Open Player in New Tab
        function playInNewTab(encodedData) {
            const c = JSON.parse(decodeURIComponent(encodedData));
            
            const name = c.name;
            const url = c.link;
            const kid = (c.keyId && c.keyId !== "Null") ? c.keyId : "";
            const key = (c.key && c.key !== "Null") ? c.key : "";
            
            // Extract string representation of cookie if it's an object
            let cookie = c.cookie;
            if (typeof cookie === 'object' && cookie !== null) cookie = JSON.stringify(cookie);

            const safeKid = JSON.stringify(kid);
            const safeKey = JSON.stringify(key);
            const safeCookie = JSON.stringify(cookie || "");
            const safeUrl = JSON.stringify(url);

            const playerCode = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${name} - Live TV</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"><\/script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; }
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; background: #000; object-fit: contain; outline: none; }
  </style>
</head>
<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline id="video"></video>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            alert('Your browser does not support Shaka Player.');
            return;
        }

        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);

        ui.configure({
            controlPanelElements: ['play_pause', 'time_and_duration', 'mute', 'volume', 'spacer', 'quality', 'fullscreen'],
            seekBarColors: { base: 'rgba(255,255,255,0.3)', buffered: 'rgba(255,255,255,0.5)', played: '#e50914' }
        });

        const kid = ${safeKid};
        const key = ${safeKey};
        const cookieHeader = ${safeCookie};
        const streamUrl = ${safeUrl};

        // Inject ClearKeys DRM
        let drmConfig = { clearKeys: {} };
        if(kid && key && kid !== "" && key !== "") {
            drmConfig.clearKeys[kid] = key;
        }
        player.configure({ drm: drmConfig });

        // Inject Cookies & Headers automatically
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            
            if (cookieHeader && cookieHeader.includes('__hdnea')) {
                // If it's an Akamai cookie stream, append to URL
                if (request.uris[0] && !request.uris[0].includes('__hdnea=')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + cookieHeader;
                }
            } else if (cookieHeader) {
                // Otherwise pass it in headers
                request.headers['Cookie'] = cookieHeader;
            }
        });

        try {
            await player.load(streamUrl);
            video.play();
        } catch (e) { 
            console.error('Error loading stream:', e); 
        }
    });
  <\/script>
</body>
</html>`;

            // Open dynamically constructed Player UI as a secure blob object
            const blob = new Blob([playerCode], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
        }

        // Initialize App Sequence
        fetchServerData();
    </script>
</body>
</html>
