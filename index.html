<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <style>
    /* Remove all margins/padding and prevent scrollbars */
    html, body { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #000; 
        font-family: sans-serif;
    }

    /* Absolute positioning to fill the entire viewport */
    #videoFrame {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }

    /* --- ADDED: Menu Styles --- */
    #menuBtn {
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 101;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: 1px solid #444;
        padding: 8px 15px;
        font-size: 20px;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.2s;
    }
    #menuBtn:hover { background: #333; }
    
    #channelListContainer {
        position: absolute;
        top: 0;
        right: -320px; /* Hidden off-screen initially */
        width: 300px;
        height: 100%;
        background: rgba(15, 15, 15, 0.95);
        color: white;
        z-index: 100;
        overflow-y: auto;
        transition: 0.3s ease-in-out;
        border-left: 1px solid #333;
        box-shadow: -5px 0 15px rgba(0,0,0,0.5);
    }
    #channelListContainer.open {
        right: 0; /* Slide in */
    }
    
    .list-header {
        padding: 20px;
        background: #000;
        border-bottom: 1px solid #333;
        font-size: 18px;
        font-weight: bold;
        position: sticky;
        top: 0;
    }

    .channel-item {
        padding: 12px 20px;
        border-bottom: 1px solid #222;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .channel-item:hover { background: #2a2a2a; }
    .channel-id { color: #00ff6a; font-size: 12px; font-weight: bold; }
    .channel-name { font-size: 14px; }
  </style>
</head>
<body>

  <iframe 
    id="videoFrame" 
    src="" 
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
    sandbox="allow-scripts allow-same-origin allow-forms"
    allowfullscreen 
    referrerpolicy="no-referrer">
  </iframe>

  <button id="menuBtn">☰</button>
  <div id="channelListContainer">
      <div class="list-header">All Channels</div>
      <div id="listContent">
          <div style="padding: 20px; color: #888;">Loading channels...</div>
      </div>
  </div>

  <script>
    // --- ORIGINAL CODE (Untouched) ---
    const iframe = document.getElementById("videoFrame");

    function getIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    async function loadChannel(id) {
      try {
        const response = await fetch("https://raw.githubusercontent.com/vaathala00/jow/main/output.json");
        const data = await response.json();
        const channel = data.find(c => c.id === id);
        
        if (channel) {
          iframe.src = channel.link; 
          document.title = channel.name + " - Live";
        }
      } catch (err) {
        console.error("Failed to load channel:", err);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      // Default to 1106 if no ID is provided
      const id = getIdFromUrl() || "1106";
      loadChannel(id);
    });

    // --- ADDED: Code to fetch and show the channel list ---
    const menuBtn = document.getElementById("menuBtn");
    const listContainer = document.getElementById("channelListContainer");
    const listContent = document.getElementById("listContent");

    // Toggle Menu
    menuBtn.addEventListener("click", () => {
        listContainer.classList.toggle("open");
    });

    // Fetch and Populate the list
    async function populateChannelList() {
        try {
            const response = await fetch("https://raw.githubusercontent.com/vaathala00/jow/main/output.json");
            const data = await response.json();
            
            let html = '';
            data.forEach(c => {
                html += `
                <div class="channel-item" onclick="selectChannel('${c.id}')">
                    <span class="channel-id">[ID: ${c.id}]</span>
                    <span class="channel-name">${c.name || "Unknown"}</span>
                </div>`;
            });
            listContent.innerHTML = html;
        } catch (err) {
            listContent.innerHTML = `<div style="padding: 20px; color: red;">Failed to load list.</div>`;
        }
    }

    // Function called when a channel is clicked from the list
    function selectChannel(id) {
        // Change URL without reloading the page, then load the video
        window.history.pushState({}, "", "?id=" + id);
        loadChannel(id);
        
        // Auto-close menu on mobile
        if(window.innerWidth < 768) {
            listContainer.classList.remove("open");
        }
    }

    // Initialize list
    populateChannelList();
  </script>
</body>
</html>
