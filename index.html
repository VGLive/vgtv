<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
<title>VG Live TV</title>
<link href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhv4hV1H0Xqxsr9CDQe9deTITndhMA2RAFS-JkdfJbIsdKSYWy7u0Sf6S7vj9jufEOp9Ihas7sD7oa7mi_Yb8cGGBfvepuuGk-nyvqpkvD9DkB4WXOwvWZKEgz68F6LxqD75fKOxDeMRB4YTgBdc_KbvvSAcGqd-Wr3ZHdTwqTi3uPMOHpUATgIZ2RURGyz/s5001/tv.png" rel="icon" type="image/png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body,html{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#000;-webkit-tap-highlight-color:transparent}.section,.widget{margin:0;padding:0}
</style>
</head>
<body>

<div id="iptv-app">
<style>
#iptv-app{display:flex;width:100%;height:100dvh;font-family:sans-serif;color:#fff;background:#000}
#sidebar{width:320px;background:#141414;display:flex;flex-direction:column;border-right:1px solid #222;z-index:200;transition:0.3s}
.header{padding:20px;background:#1a1a1a;border-bottom:1px solid #333;display:flex;flex-direction:column;gap:8px}
.app-title{display:flex;justify-content:space-between;align-items:center;width:100%}
.title-group{display:flex;align-items:center;gap:10px;color:#e50914;font-weight:900;font-size:22px}
#close-icon{display:none;color:#fff;font-size:24px;cursor:pointer;padding:5px}
.credit-text{font-size:11px;color:#666;font-weight:bold;text-transform:uppercase}
.sub-header{color:#fff;font-size:14px;font-weight:bold;letter-spacing:1px;margin:5px 0;border-left:3px solid #e50914;padding-left:10px}
#search-box{width:100%;padding:10px;background:#000;border:1px solid #333;color:white;border-radius:6px;box-sizing:border-box;outline:none;font-size:14px;margin-top:5px}
#search-box:focus{border-color:#e50914}
#channel-list{flex:1;overflow-y:auto}
.channel-item{padding:12px 20px;border-bottom:1px solid #1f1f1f;cursor:pointer;display:flex;align-items:center}
.channel-item.active{background:#e50914}
.ch-badge{background:rgba(255,255,255,0.1);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;margin-right:10px;flex-shrink:0}
.channel-item.active .ch-badge{background:white;color:#e50914}
.ch-icon{width:32px;height:32px;object-fit:contain;margin-right:12px;border-radius:4px;background:rgba(255,255,255,0.05)}
.ch-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.retry-btn{background:#e50914;color:white;border:none;padding:10px 20px;border-radius:5px;margin-top:15px;cursor:pointer;font-weight:bold;font-size:14px;display:flex;align-items:center;gap:8px}

#video-wrapper{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative;width:100%;height:100%;overflow:hidden}

#mobile-menu-btn{display:none;position:fixed;top:20px;left:20px;background:#e50914;color:white;border:none;padding:10px 14px;border-radius:8px;z-index:300;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
#mobile-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:150}

#lock-btn{position:absolute;top:20px;right:20px;padding:10px 15px;border-radius:8px;z-index:200;background:rgba(0,0,0,0.5);color:white;border:1px solid rgba(255,255,255,0.3);cursor:pointer;transition:0.3s ease;display:none;}

/* Floating Next/Prev Channel Buttons */
.ch-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:white; padding:15px 20px; border-radius:8px; cursor:pointer; z-index:50; transition:0.3s; opacity:0; font-size:20px; }
#video-wrapper:hover .ch-nav { opacity: 1; }
.ch-nav:hover { background: #e50914; }
.ch-nav.left { left: 20px; }
.ch-nav.right { right: 20px; }

/* Customizing Shaka Player Theme */
.shaka-video-container { width: 100%; height: 100%; }
.shaka-spinner-svg circle { stroke: #e50914 !important; }

@media(max-width:768px){
    #sidebar{position:absolute;left:0;top:0;height:100%;transform:translateX(-100%);width:85%;z-index:300}
    #sidebar.open{transform:translateX(0)}
    #mobile-menu-btn,#mobile-overlay.active,#close-icon{display:block}
    .ch-nav { opacity: 1; padding: 10px 15px; font-size: 16px; }
    .ch-nav.left { left: 10px; }
    .ch-nav.right { right: 10px; }
    @media(orientation:landscape){ #lock-btn{display:block;} }
}
</style>

<button id="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-list"></i></button>
<div id="mobile-overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
    <div class="header">
        <div class="app-title">
            <div class="title-group"><i class="fa-solid fa-tv"></i> <span>VG LIVE TV</span></div>
            <i class="fa-solid fa-xmark" onclick="toggleMenu()" id="close-icon"></i>
        </div>
        <div class="credit-text">Created by Vikash Gupta</div>
        <div class="sub-header">INDIAN TV CHANNELS</div>
        <input type="text" id="search-box" placeholder="Search Channels..." onkeyup="filterChannels()"/>
    </div>
    <div id="channel-list">
        <div style="padding:40px;text-align:center;color:#555;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br/><br/>Loading...</div>
    </div>
</div>

<div id="video-wrapper" data-shaka-player-container>
    <video id="main-player" autoplay playsinline data-shaka-player></video>
    
    <button id="lock-btn" onclick="toggleLock(event)"><i class="fa-solid fa-lock-open"></i></button>
    
    <div class="ch-nav left" onclick="changeChannel(-1)"><i class="fa-solid fa-backward-step"></i></div>
    <div class="ch-nav right" onclick="changeChannel(1)"><i class="fa-solid fa-forward-step"></i></div>
</div>

<script>
// The New JSON API Link provided
const API_URL = 'https://raw.githubusercontent.com/vaathala00/jow/main/output.json';

const V = document.getElementById('main-player');
const LST = document.getElementById('channel-list');
const SB = document.getElementById('sidebar');
const OV = document.getElementById('mobile-overlay');
const MB = document.getElementById('mobile-menu-btn');
const LB = document.getElementById('lock-btn');
const container = document.getElementById('video-wrapper');

let player, ui, AC=[], ci=-1, il=false;

document.addEventListener('DOMContentLoaded', () => {
    shaka.polyfill.installAll();
    if (shaka.Player.isBrowserSupported()) {
        player = new shaka.Player(V);
        ui = new shaka.ui.Overlay(player, container, V);
        
        ui.configure({
            controlPanelElements: [
                'play_pause',
                'rewind',
                'fast_forward',
                'time_and_duration',
                'mute',
                'volume',
                'spacer',
                'language',
                'captions',
                'picture_in_picture',
                'quality',
                'fullscreen'
            ],
            seekBarColors: { 
                base: 'rgba(255,255,255,0.3)', 
                buffered: 'rgba(255,255,255,0.5)', 
                played: '#e50914' 
            },
            addBigPlayButton: true
        });

        player.addEventListener('error', (e) => console.error('Shaka Error:', e.detail));
    } else {
        console.error('Browser not supported!');
    }
});

function toggleLock(e){
    e.stopPropagation();
    il = !il;
    const shakaControls = document.querySelector('.shaka-controls-container');
    const navs = document.querySelectorAll('.ch-nav');
    
    if(il){
        LB.innerHTML = '<i class="fa-solid fa-lock"></i>';
        LB.style.background = '#e50914';
        
        if(shakaControls) {
            shakaControls.style.opacity = '0';
            shakaControls.style.pointerEvents = 'none';
        }
        MB.style.display = 'none';
        navs.forEach(n => n.style.display = 'none');
    } else {
        LB.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
        LB.style.background = 'rgba(0,0,0,0.5)';
        
        if(shakaControls) {
            shakaControls.style.opacity = '';
            shakaControls.style.pointerEvents = '';
        }
        MB.style.display = 'block';
        navs.forEach(n => n.style.display = 'block');
    }
}

function changeChannel(s){
    if(il) return;
    if(AC.length===0) return;
    let n = ci + s;
    if(n >= AC.length) n = 0;
    if(n < 0) n = AC.length - 1;
    playChannelByIndex(n);
}

function playChannelByIndex(i){
    if(i < 0 || i >= AC.length) return;
    const c = AC[i];
    ci = i;
    play(c);
    
    document.querySelectorAll('.channel-item').forEach(e => e.classList.remove('active'));
    const a = document.querySelectorAll('.channel-item')[i];
    if(a){
        a.classList.add('active');
        a.scrollIntoView({behavior:'smooth',block:'center'});
    }
}

// Fetches the JSON file automatically on load
window.loadChannels = async function(){
    LST.innerHTML='<div style="padding:40px;text-align:center;color:#555;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Loading Channels...</div>';
    try {
        const r = await fetch(API_URL);
        if(r.ok){ 
            const data = await r.json(); 
            processJSON(data);
        } else {
            throw new Error('Network Error');
        }
    } catch(e) {
        LST.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;"><button class="retry-btn" onclick="window.loadChannels()"><i class="fa-solid fa-rotate-right"></i>Retry</button></div>';
    }
};

function processJSON(data){
    // Smart Parser for array or wrapped object
    AC = Array.isArray(data) ? data : (data.channels || data.data || data.result || []);
    LST.innerHTML = '';
    
    // Sort channels alphabetically by name
    AC.sort((a,b) => (a.channel_name || "").localeCompare(b.channel_name || ""));
    
    AC.forEach((c,i) => createItem(i, i+1, c.channel_name || "Unknown", c.channel_logo || ""));
}

function createItem(i, n, m, l){
    const d = document.createElement('div');
    d.className = 'channel-item';
    d.setAttribute('data-s', m.toLowerCase()+' '+n);
    let g = l ? `<img src="${l}" class="ch-icon" onerror="this.style.display='none'">` : '';
    d.innerHTML = `<div class="ch-badge">${n}</div> ${g} <span class="ch-name">${m}</span>`;
    d.onclick = () => {
        playChannelByIndex(i);
        if(window.innerWidth < 768) toggleMenu();
    };
    LST.appendChild(d);
}

async function play(channelData){
    if(player){
        try {
            // Unload previous config
            await player.unload();
            player.getNetworkingEngine().clearAllRequestFilters();

            // Set DRM Keys if provided
            let drmConfig = { clearKeys: {} };
            const kid = channelData.keyId;
            const key = channelData.key;
            
            if(kid && key && kid !== "Null" && key !== "Null" && kid !== "" && key !== "") {
                drmConfig.clearKeys[kid] = key;
            }
            player.configure({ drm: drmConfig });

            // Set custom headers/cookies if provided
            const cookieHeader = channelData.cookie || "";
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                if(cookieHeader) request.headers['Cookie'] = cookieHeader;
                
                if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && request.uris[0] && !request.uris[0].includes('__hdnea=')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + cookieHeader;
                }
            });

            // Load Stream
            await player.load(channelData.channel_url);
            V.play();
        } catch (e) {
            console.error('Shaka Load Error:', e);
            // Fallback for HLS streams on iOS/Safari
            if(V.canPlayType('application/vnd.apple.mpegurl')){
                V.src = channelData.channel_url;
                V.play();
            }
        }
    }
}

function filterChannels(){
    const t = document.getElementById('search-box').value.toLowerCase();
    document.querySelectorAll('.channel-item').forEach(i => {
        i.style.display = i.getAttribute('data-s').includes(t) ? 'flex' : 'none';
    });
}

function toggleMenu(){
    if(il) return;
    SB.classList.toggle('open');
    const o = SB.classList.contains('open');
    OV.style.display = o ? 'block' : 'none';
    MB.style.display = o ? 'none' : 'block';
}

// Start sequence
window.loadChannels();
</script>
</div>
</body>
</html>
