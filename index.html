<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
<title>VG Live TV</title>
<link href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhv4hV1H0Xqxsr9CDQe9deTITndhMA2RAFS-JkdfJbIsdKSYWy7u0Sf6S7vj9jufEOp9Ihas7sD7oa7mi_Yb8cGGBfvepuuGk-nyvqpkvD9DkB4WXOwvWZKEgz68F6LxqD75fKOxDeMRB4YTgBdc_KbvvSAcGqd-Wr3ZHdTwqTi3uPMOHpUATgIZ2RURGyz/s5001/tv.png" rel="icon" type="image/png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body,html{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#000;-webkit-tap-highlight-color:transparent}.section,.widget{margin:0;padding:0}
</style>
</head>
<body>

<div id="iptv-app">
<style>
#iptv-app{display:flex;width:100%;height:100dvh;font-family:sans-serif;color:#fff;background:#000}
#sidebar{width:320px;background:#141414;display:flex;flex-direction:column;border-right:1px solid #222;z-index:20;transition:0.3s}
.header{padding:20px;background:#1a1a1a;border-bottom:1px solid #333;display:flex;flex-direction:column;gap:8px}
.app-title{display:flex;justify-content:space-between;align-items:center;width:100%}
.title-group{display:flex;align-items:center;gap:10px;color:#e50914;font-weight:900;font-size:22px}
#close-icon{display:none;color:#fff;font-size:24px;cursor:pointer;padding:5px}
.credit-text{font-size:11px;color:#666;font-weight:bold;text-transform:uppercase}
.sub-header{color:#fff;font-size:14px;font-weight:bold;letter-spacing:1px;margin:5px 0;border-left:3px solid #e50914;padding-left:10px}
#search-box{width:100%;padding:10px;background:#000;border:1px solid #333;color:white;border-radius:6px;box-sizing:border-box;outline:none;font-size:14px;margin-top:5px}
#search-box:focus{border-color:#e50914}
#channel-list{flex:1;overflow-y:auto}
.channel-item{padding:12px 20px;border-bottom:1px solid #1f1f1f;cursor:pointer;display:flex;align-items:center}
.channel-item.active{background:#e50914}
.ch-badge{background:rgba(255,255,255,0.1);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;margin-right:10px;flex-shrink:0}
.channel-item.active .ch-badge{background:white;color:#e50914}
.ch-icon{width:32px;height:32px;object-fit:contain;margin-right:12px;border-radius:4px;background:rgba(255,255,255,0.05)}
.ch-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.retry-btn{background:#e50914;color:white;border:none;padding:10px 20px;border-radius:5px;margin-top:15px;cursor:pointer;font-weight:bold;font-size:14px;display:flex;align-items:center;gap:8px}
#video-container{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative;width:100%;height:100%;overflow:hidden}
video{width:100%;height:100%;outline:none;object-fit:contain;z-index:1}
#advanced-controls{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(to top,rgba(0,0,0,0.95),transparent);padding:15px 20px;padding-bottom:env(safe-area-inset-bottom,20px);box-sizing:border-box;display:flex;align-items:center;justify-content:space-between;transition:opacity 0.3s ease;opacity:1;z-index:100}
#advanced-controls.hidden{opacity:0;pointer-events:none}
.controls-left,.controls-right{display:flex;align-items:center;gap:15px}
.ctrl-btn{background:none;border:none;color:white;font-size:20px;cursor:pointer;transition:0.2s;padding:5px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));display:flex;align-items:center;justify-content:center}
.ctrl-btn:hover{color:#e50914;transform:scale(1.1)}
.vol-container{display:flex;align-items:center;gap:8px;width:100px}
input[type=range]{width:100%;height:4px;background:#555;border-radius:2px;-webkit-appearance:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:white;border-radius:50%}
.live-indicator{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:bold;color:#aaa;text-transform:uppercase;margin-right:5px;cursor:pointer}
.live-indicator.is-live{color:white}
.dot{width:8px;height:8px;border-radius:50%;background:#666;transition:0.3s}
.live-indicator.is-live .dot{background:#e50914;box-shadow:0 0 8px #e50914;animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}
#quality-menu{display:none;position:absolute;bottom:60px;right:60px;background:rgba(20,20,20,0.95);border:1px solid #333;border-radius:8px;padding:5px 0;min-width:100px;z-index:150;max-height:200px;overflow-y:auto}
.q-item{padding:8px 15px;font-size:13px;color:#ccc;cursor:pointer}.q-item:hover{background:#333;color:white}.q-item.selected{color:#e50914;font-weight:bold}
#mobile-menu-btn{display:none;position:fixed;top:20px;left:20px;background:#e50914;color:white;border:none;padding:10px 14px;border-radius:8px;z-index:101;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
#mobile-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:200}
#lock-btn{display:none;position:absolute;top:20px;right:70px;padding:10px 15px;border-radius:8px;z-index:200;background:rgba(0,0,0,0.5);color:white;border:1px solid rgba(255,255,255,0.3);cursor:pointer;transition:opacity 0.3s ease;padding-right:env(safe-area-inset-right,20px)}
#lock-btn.fade-out{opacity:0;pointer-events:none}
@media(max-width:768px){#sidebar{position:absolute;left:0;top:0;height:100%;transform:translateX(-100%);width:85%;z-index:300}#sidebar.open{transform:translateX(0)}#mobile-menu-btn,#mobile-overlay.active,#close-icon{display:block}#advanced-controls{padding:10px 10px;padding-bottom:max(15px,env(safe-area-inset-bottom))}.vol-container{display:none}.live-indicator{font-size:10px;gap:4px}.controls-left{gap:8px}.controls-right{gap:8px}.ctrl-btn{font-size:20px;padding:5px}@media(orientation:landscape){#lock-btn{display:block}}}
</style>
<button id="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-list"></i></button><div id="mobile-overlay" onclick="toggleMenu()"></div>
<div id="sidebar"><div class="header"><div class="app-title"><div class="title-group"><i class="fa-solid fa-tv"></i> <span>VG LIVE TV</span></div><i class="fa-solid fa-xmark" onclick="toggleMenu()" id="close-icon"></i></div><div class="credit-text">Created by Vikash Gupta</div><div class="sub-header">INDIAN TV CHANNELS</div><input type="text" id="search-box" placeholder="Search Channels..." onkeyup="filterChannels()"/></div><div id="channel-list"><div style="padding:40px;text-align:center;color:#555;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br/><br/>Loading...</div></div></div>
<div id="video-container" onclick="toggleControls()">
<video id="main-player" playsinline></video><button id="lock-btn" onclick="toggleLock(event)"><i class="fa-solid fa-lock-open"></i></button><div id="quality-menu"></div>
<div id="advanced-controls" onclick="event.stopPropagation()">
<div class="controls-left">
<button class="ctrl-btn" onclick="changeChannel(-1)"><i class="fa-solid fa-backward-step"></i></button><button class="ctrl-btn" onclick="skip(-10)"><i class="fa-solid fa-rotate-left"></i></button><button class="ctrl-btn" id="play-pause-btn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button><button class="ctrl-btn" onclick="skip(10)"><i class="fa-solid fa-rotate-right"></i></button><button class="ctrl-btn" onclick="changeChannel(1)"><i class="fa-solid fa-forward-step"></i></button><div class="vol-container"><i class="fa-solid fa-volume-high" style="font-size:14px;color:#ccc;"></i><input type="range" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)" /></div>
</div>
<div class="controls-right"><div id="live-indicator" class="live-indicator" onclick="goLive()"><div class="dot"></div> LIVE</div><button id="q-btn" class="ctrl-btn" onclick="toggleQuality(event)"><i class="fa-solid fa-gear"></i></button><button class="ctrl-btn" onclick="togglePiP()"><i class="fa-solid fa-clone"></i></button><button class="ctrl-btn" onclick="toggleFullScreen()"><i class="fa-solid fa-expand"></i></button></div>
</div></div>
<script>
const L='https://iptv-org.github.io/iptv/raw/in.m3u',P=['','https://corsproxy.io/?','https://api.allorigins.win/raw?url=','https://api.codetabs.com/v1/proxy?quest='];
const V=document.getElementById('main-player'),LST=document.getElementById('channel-list'),SB=document.getElementById('sidebar'),OV=document.getElementById('mobile-overlay'),MB=document.getElementById('mobile-menu-btn'),C=document.getElementById('advanced-controls'),PB=document.querySelector('#play-pause-btn i'),LI=document.getElementById('live-indicator'),VC=document.getElementById('video-container'),LB=document.getElementById('lock-btn'),QM=document.getElementById('quality-menu'),QB=document.getElementById('q-btn');
let player,st,ct,AC=[],ci=-1,il=false;

// Initialize Shaka Player
document.addEventListener('DOMContentLoaded', () => {
    shaka.polyfill.installAll();
    if (shaka.Player.isBrowserSupported()) {
        player = new shaka.Player(V);
        player.addEventListener('error', (e) => console.error('Shaka Error:', e.detail));
        player.addEventListener('adaptation', updateQualityList); // Updates auto quality switches
    } else {
        console.error('Browser not supported!');
    }
});

function toggleQuality(e){e.stopPropagation();QM.style.display=(QM.style.display==='block')?'none':'block'}
function updateQualityList(){
    if(!player){QB.style.display='none';return}
    
    const tracks = player.getVariantTracks();
    const heights = [...new Set(tracks.map(t=>t.height).filter(Boolean))].sort((a,b)=>b-a);
    
    if(heights.length===0){QB.style.display='none';return}
    QB.style.display='flex';
    QM.innerHTML='';
    
    const config = player.getConfiguration();
    const isAuto = config.abr.enabled;
    
    let a=document.createElement('div');
    a.className='q-item '+(isAuto?'selected':'');
    a.innerText='Auto';
    a.onclick=(e)=>{
        player.configure({abr:{enabled:true}});
        updateQualityList();
        toggleQuality(e);
    };
    QM.appendChild(a);
    
    heights.forEach(h=>{
        let x=document.createElement('div');
        const active = tracks.find(t=>t.active);
        const isSelected = !isAuto && active && active.height === h;
        
        x.className='q-item '+(isSelected?'selected':'');
        x.innerText=h+'p';
        x.onclick=(e)=>{
            player.configure({abr:{enabled:false}});
            const t = player.getVariantTracks().find(tr=>tr.height===h);
            if(t) player.selectVariantTrack(t,true);
            updateQualityList();
            toggleQuality(e);
        };
        QM.appendChild(x);
    });
}

function togglePiP(){if(document.pictureInPictureElement)document.exitPictureInPicture();else if(document.pictureInPictureEnabled)V.requestPictureInPicture()}
function toggleLock(e){e.stopPropagation();il=!il;if(il){LB.innerHTML='<i class="fa-solid fa-lock"></i>';LB.style.background='#e50914';C.classList.add('hidden');MB.style.display='none'}else{LB.innerHTML='<i class="fa-solid fa-lock-open"></i>';LB.style.background='rgba(0,0,0,0.5)';C.classList.remove('hidden');MB.style.display='block'}showControls()}
function toggleControls(){if(C.classList.contains('hidden')||LB.classList.contains('fade-out'))showControls();else if(!V.paused)hideAllControls()}
function showControls(){LB.classList.remove('fade-out');if(!il)C.classList.remove('hidden');clearTimeout(ct);if(!V.paused)ct=setTimeout(hideAllControls,3000)}
function hideAllControls(){LB.classList.add('fade-out');if(!il){C.classList.add('hidden');QM.style.display='none'}}

V.addEventListener('playing',()=>{PB.className='fa-solid fa-pause';LI.classList.add('is-live');clearTimeout(st);showControls()});
V.addEventListener('pause',()=>{PB.className='fa-solid fa-play';LI.classList.remove('is-live');showControls();clearTimeout(ct)});
V.addEventListener('waiting',()=>LI.classList.remove('is-live'));V.addEventListener('error',()=>LI.classList.remove('is-live'));

function togglePlay(){if(il)return;if(V.paused)V.play();else V.pause()}
function skip(s){if(il)return;V.currentTime+=s;showControls()}
function setVolume(v){V.volume=v}
function goLive(){if(il)return;if(V.seekable.length)V.currentTime=V.seekable.end(0);V.play()}
function changeChannel(s){if(il)return;if(AC.length===0)return;let n=ci+s;if(n>=AC.length)n=0;if(n<0)n=AC.length-1;playChannelByIndex(n)}
function playChannelByIndex(i){if(i<0||i>=AC.length)return;const c=AC[i];ci=i;play(c.url);document.querySelectorAll('.channel-item').forEach(e=>e.classList.remove('active'));const a=document.querySelectorAll('.channel-item')[i];if(a){a.classList.add('active');a.scrollIntoView({behavior:'smooth',block:'center'})}}
function toggleFullScreen(){if(il)return;if(!document.fullscreenElement&&!document.webkitFullscreenElement){if(VC.requestFullscreen){VC.requestFullscreen().then(()=>lockLandscape()).catch(e=>{})}else if(VC.webkitRequestFullscreen){VC.webkitRequestFullscreen()}else if(V.webkitEnterFullscreen){V.webkitEnterFullscreen()}}else{if(document.exitFullscreen){document.exitFullscreen().then(()=>unlockOrientation())}else if(document.webkitExitFullscreen){document.webkitExitFullscreen()}}}
function lockLandscape(){if(screen.orientation&&screen.orientation.lock){screen.orientation.lock('landscape').catch(e=>{})}}
function unlockOrientation(){if(screen.orientation&&screen.orientation.unlock){screen.orientation.unlock()}}

window.loadChannels=async function(){LST.innerHTML='<div style="padding:40px;text-align:center;color:#555;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Loading Channels...</div>';let d=null;for(let p of P){try{const r=await fetch(p+encodeURIComponent(L));if(r.ok){d=await r.text();break}}catch(e){}}if(d)processM3U(d);else LST.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;"><button class="retry-btn" onclick="window.loadChannels()"><i class="fa-solid fa-rotate-right"></i>Retry</button></div>'};

function processM3U(d){const l=d.split('\n');LST.innerHTML='';AC=[];let n='';let g='';l.forEach(x=>{x=x.trim();if(x.includes('#EXTINF:')){n=x.split(',').pop().trim();const m=x.match(/tvg-logo=["\']([^"\']+)["\']/);g=m?m[1]:''}else if(x.startsWith('http')&&n){AC.push({name:n,url:x,logo:g});n='';g=''}});AC.sort((a,b)=>a.name.localeCompare(b.name));AC.forEach((c,i)=>createItem(i,i+1,c.name,c.url,c.logo))}
function createItem(i,n,m,u,l){const d=document.createElement('div');d.className='channel-item';d.setAttribute('data-s',m.toLowerCase()+' '+n);let g=l?`<img src="${l}" class="ch-icon" onerror="this.style.display='none'">`:'';d.innerHTML=`<div class="ch-badge">${n}</div> ${g} <span class="ch-name">${m}</span>`;d.onclick=()=>{playChannelByIndex(i);if(window.innerWidth<768)toggleMenu()};LST.appendChild(d)}

async function play(u){
    LI.classList.remove('is-live');
    clearTimeout(st);
    st=setTimeout(()=>{if(V.paused||V.readyState<3)changeChannel(1)},10000);
    
    if(player){
        try {
            await player.load(u);
            V.play();
            updateQualityList();
        } catch (e) {
            console.error('Shaka Load Error:', e);
        }
    } else if(V.canPlayType('application/vnd.apple.mpegurl')){
        V.src=u;
        V.play();
        QB.style.display='none';
    }
}

function filterChannels(){const t=document.getElementById('search-box').value.toLowerCase();document.querySelectorAll('.channel-item').forEach(i=>{i.style.display=i.getAttribute('data-s').includes(t)?'flex':'none'})}
function toggleMenu(){if(il)return;SB.classList.toggle('open');const o=SB.classList.contains('open');OV.style.display=o?'block':'none';MB.style.display=o?'none':'block'}
window.loadChannels();
</script>
</div>
</body>
</html>
